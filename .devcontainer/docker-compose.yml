services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    image: projectblueprint-devcontainer
    volumes:
      - ..:/workspace:cached
      - claude-config:/root/.claude
      - ${SSH_AUTH_SOCK}:/ssh-agent
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
    command: sleep infinity

volumes:
  claude-config:
